<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ZEALWISH — AI character life system.</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="ZEALWISH is an English-only AI character life system for creating, growing, owning, and carrying a wallet-ready AI character across future worlds." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #070707;
    --black-2: #0c0c0c;
    --panel: rgba(11, 11, 11, 0.88);
    --panel-strong: rgba(14, 14, 14, 0.96);
    --red: #ff2d2d;
    --red-2: #ff4960;
    --red-soft: rgba(255, 45, 45, 0.16);
    --line-red: rgba(255, 45, 45, 0.68);
    --line: rgba(255, 255, 255, 0.14);
    --white: #ffffff;
    --muted: rgba(255, 255, 255, 0.68);
    --faint: rgba(255, 255, 255, 0.38);
    --dim: rgba(255, 255, 255, 0.18);
    --success: #78ffb7;
    --gold: #ffd36e;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--black);
    color: var(--white);
    font-family: "Space Grotesk", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.032) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.032) 1px, transparent 1px),
      radial-gradient(circle at 76% 18%, rgba(255,45,45,0.28), transparent 32%),
      radial-gradient(circle at 8% 78%, rgba(255,45,45,0.16), transparent 28%),
      #070707;
    background-size: 34px 34px, 34px 34px, auto, auto, auto;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.24;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 5px),
      radial-gradient(ellipse at center, transparent 0 58%, rgba(0,0,0,0.86) 100%);
    mix-blend-mode: screen;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; }
  img { display: block; max-width: 100%; }
  #root { position: relative; z-index: 2; min-height: 100vh; }

  .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .display { font-family: "Space Grotesk", system-ui, sans-serif; letter-spacing: -0.07em; }
  .edge { clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px)); }
  .shell { min-height: 100vh; }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 30;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 0 clamp(18px, 4vw, 64px);
    background: linear-gradient(180deg, rgba(7,7,7,0.98), rgba(7,7,7,0.54), transparent);
    backdrop-filter: blur(8px);
  }
  .brand {
    font-size: clamp(28px, 4vw, 54px);
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: -0.08em;
    text-transform: uppercase;
  }
  .nav { display: flex; align-items: center; gap: clamp(12px, 2vw, 28px); }
  .nav a {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 160ms ease;
  }
  .nav a:hover { color: var(--white); }

  .primary-button, .secondary-button, .wallet-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    border: 1px solid var(--red);
    padding: 0 18px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    font-weight: 700;
    transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
  }
  .primary-button, .wallet-button {
    background: var(--red);
    color: var(--white);
    box-shadow: 0 16px 42px rgba(255,45,45,0.28);
  }
  .secondary-button { background: transparent; color: var(--white); }
  .primary-button:hover, .secondary-button:hover, .wallet-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 20px 54px rgba(255,45,45,0.38);
  }

  .hero {
    min-height: 100svh;
    display: grid;
    grid-template-columns: minmax(0, 1.02fr) minmax(320px, 0.98fr);
    align-items: center;
    gap: clamp(28px, 5vw, 72px);
    padding: 104px clamp(18px, 5vw, 84px) 44px;
  }
  .hero-copy { max-width: 760px; position: relative; z-index: 3; }
  .kicker, .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .kicker::before, .eyebrow::before {
    content: "";
    width: 7px; height: 7px;
    background: var(--red);
    box-shadow: 0 0 22px var(--red);
  }
  .hero h1 {
    margin: 18px 0 0;
    font-size: clamp(62px, 10vw, 156px);
    line-height: 0.78;
    text-transform: uppercase;
  }
  .hero h2 {
    margin: 18px 0 0;
    max-width: 720px;
    font-size: clamp(30px, 4.4vw, 70px);
    line-height: 0.94;
  }
  .hero h2 span { color: var(--red); }
  .hero p, .section-heading p, .app-copy p {
    margin: 22px 0 0;
    color: var(--muted);
    font-size: clamp(15px, 1.35vw, 19px);
    line-height: 1.68;
  }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 30px; }
  .signal-strip {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    border-top: 1px solid var(--line-red);
    border-bottom: 1px solid var(--line-red);
    max-width: 760px;
  }
  .signal-strip div { padding: 14px 12px; border-right: 1px solid var(--line-red); }
  .signal-strip div:last-child { border-right: 0; }
  .signal-strip strong { display: block; font-size: 12px; color: var(--red); }
  .signal-strip span { display: block; margin-top: 6px; color: var(--faint); font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; }

  .character-stage { position: relative; min-height: min(76vh, 760px); display: grid; place-items: center; overflow: hidden; }
  .frame {
    position: absolute;
    inset: 5% 3%;
    border: 2px solid var(--red);
    background: linear-gradient(135deg, transparent 0 12%, rgba(255,45,45,0.1) 12% 13%, transparent 13%), rgba(8,8,8,0.42);
  }
  .frame::before, .frame::after { content: ""; position: absolute; pointer-events: none; }
  .frame::before { inset: 22px; border: 1px solid rgba(255,255,255,0.14); }
  .frame::after { right: 22px; bottom: 22px; width: 140px; height: 38px; background: repeating-linear-gradient(90deg, var(--red) 0 10px, transparent 10px 16px); opacity: 0.72; }
  .character-card { position: relative; width: min(470px, 86vw); min-height: 650px; display: grid; place-items: end center; padding: 34px 24px 18px; }
  .character-card img { width: min(780px, 96vw); max-width: none; margin-top: -28px; margin-left: -190px; filter: drop-shadow(0 34px 50px rgba(0,0,0,0.72)); animation: float 4s ease-in-out infinite; }
  .character-tag { position: absolute; top: 16px; right: 18px; padding: 8px 12px; color: var(--red); border: 1px solid var(--line-red); background: rgba(10,10,10,0.88); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
  .system-panel { position: absolute; left: 0; bottom: 38px; width: min(340px, 76vw); padding: 18px; background: rgba(10,10,10,0.88); border: 1px solid var(--line-red); }
  .system-panel h3 { margin: 0 0 12px; font-size: 14px; letter-spacing: 0.12em; color: var(--red); text-transform: uppercase; }
  .system-panel p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }

  .ticker { overflow: hidden; border-top: 1px solid var(--line-red); border-bottom: 1px solid var(--line-red); background: rgba(255,45,45,0.08); }
  .ticker-track { display: flex; width: max-content; animation: ticker 44s linear infinite; }
  .ticker span { padding: 14px 22px; color: var(--muted); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; white-space: nowrap; }
  .ticker b { color: var(--red); }

  .section { padding: clamp(64px, 9vw, 128px) clamp(18px, 5vw, 84px); position: relative; }
  .section-heading { max-width: 960px; margin-bottom: 38px; }
  .section-heading h2 { margin: 14px 0 0; max-width: 900px; font-size: clamp(42px, 6vw, 96px); line-height: 0.9; }
  .journey-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 1px; border: 1px solid var(--line-red); background: var(--line-red); }
  .journey-card { min-height: 290px; padding: 24px; background: linear-gradient(180deg, rgba(255,45,45,0.08), transparent), rgba(10,10,10,0.94); display: flex; flex-direction: column; justify-content: space-between; }
  .journey-card .code { color: var(--red); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
  .journey-card h3 { margin: 30px 0 10px; font-size: clamp(24px, 2.8vw, 38px); line-height: 0.94; }
  .journey-card p { margin: 0; color: var(--muted); line-height: 1.58; font-size: 14px; }

  .split { display: grid; grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr); gap: 1px; border: 1px solid var(--line-red); background: var(--line-red); }
  .split-panel { background: rgba(10,10,10,0.96); padding: clamp(28px, 5vw, 58px); }
  .split-panel h2 { margin: 0; font-size: clamp(42px, 5.6vw, 88px); line-height: 0.88; }
  .split-panel p { margin: 20px 0 0; color: var(--muted); font-size: 17px; line-height: 1.65; }
  .protocol-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1px; background: rgba(255,45,45,0.42); }
  .protocol-card { min-height: 220px; padding: 24px; background: rgba(11,11,11,0.94); }
  .protocol-card .code { color: var(--red); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
  .protocol-card h3 { margin: 34px 0 10px; font-size: clamp(24px, 2.8vw, 36px); line-height: 0.95; }
  .protocol-card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.58; }

  .wallet-rail { display: grid; gap: 14px; }
  .wallet-step { display: grid; grid-template-columns: 108px 1fr; border: 1px solid var(--line-red); background: rgba(10,10,10,0.72); }
  .wallet-step .label { padding: 18px; color: var(--red); border-right: 1px solid var(--line-red); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
  .wallet-step .copy { padding: 18px; }
  .wallet-step h3 { margin: 0 0 6px; font-size: 20px; }
  .wallet-step p { margin: 0; color: var(--muted); line-height: 1.56; font-size: 14px; }

  .app-shell { position: fixed; inset: 0; z-index: 100; display: grid; grid-template-columns: 280px 1fr; background: var(--black); animation: fade-in 360ms ease-out; }
  .app-side { border-right: 1px solid var(--line-red); padding: 28px 22px; background: rgba(7,7,7,0.96); overflow: auto; }
  .app-side h2 { margin: 0; font-size: 34px; letter-spacing: -0.08em; }
  .app-side p { margin: 8px 0 24px; color: var(--faint); font-size: 12px; line-height: 1.5; }
  .app-nav { display: grid; gap: 8px; }
  .app-nav button { text-align: left; border: 1px solid var(--line); background: transparent; color: var(--muted); padding: 13px 14px; cursor: pointer; transition: color 160ms ease, border-color 160ms ease, background 160ms ease; }
  .app-nav button.active, .app-nav button:hover { color: var(--white); border-color: var(--red); background: rgba(255,45,45,0.08); }
  .app-main { overflow: auto; padding: 34px clamp(24px, 4vw, 56px); }
  .app-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; margin-bottom: 28px; }
  .app-head h1 { margin: 0; max-width: 820px; font-size: clamp(44px, 6.5vw, 104px); line-height: 0.84; }
  .app-grid { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr); gap: 18px; }
  .app-panel { border: 1px solid var(--line-red); background: var(--panel); padding: 24px; min-height: 360px; }
  .app-panel h3 { margin: 0 0 12px; font-size: 24px; }
  .app-panel p { color: var(--muted); line-height: 1.6; }
  .status-list { display: grid; gap: 10px; margin-top: 18px; }
  .status-list div { display: flex; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 10px; color: var(--muted); }
  .status-list b { color: var(--white); }
  .timeline { display: grid; gap: 12px; }
  .timeline div { border-left: 2px solid var(--red); padding-left: 16px; color: var(--muted); }
  .timeline b { display: block; color: var(--white); margin-bottom: 4px; }
  .close-app { background: transparent; color: var(--white); border: 1px solid var(--line-red); cursor: pointer; min-height: 42px; padding: 0 16px; }

  .final-cta { min-height: 64vh; display: grid; place-items: center; text-align: center; padding: clamp(80px, 12vw, 150px) 18px; }
  .final-cta h2 { margin: 0; max-width: 980px; font-size: clamp(54px, 9vw, 142px); line-height: 0.82; }
  .final-cta p { max-width: 640px; margin: 24px auto 0; color: var(--muted); line-height: 1.65; font-size: 18px; }
  .final-cta .actions { justify-content: center; }

  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; scroll-behavior: auto !important; transition: none !important; }
  }
  @media (max-width: 1100px) {
    .hero, .split, .app-grid { grid-template-columns: 1fr; }
    .journey-grid { grid-template-columns: 1fr; }
    .signal-strip { grid-template-columns: 1fr; }
    .signal-strip div { border-right: 0; border-bottom: 1px solid var(--line-red); }
    .signal-strip div:last-child { border-bottom: 0; }
    .protocol-grid { grid-template-columns: 1fr; }
    .character-stage { min-height: 650px; }
    .system-panel { left: 18px; bottom: 10px; }
  }
  @media (max-width: 720px) {
    .topbar { position: absolute; padding-top: 18px; align-items: flex-start; }
    .nav { display: none; }
    .topbar .wallet-button { display: none; }
    .hero { padding-left: 24px; padding-right: 24px; overflow: hidden; }
    .actions { display: grid; grid-template-columns: 1fr; }
    .primary-button, .secondary-button { width: 100%; }
    .character-card { width: 100%; min-height: 560px; overflow: hidden; }
    .character-card img { width: min(650px, 158vw); margin-left: -126px; }
    .app-shell { position: fixed; grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .app-side { border-right: 0; border-bottom: 1px solid var(--line-red); max-height: 260px; }
    .app-main { padding: 24px; }
    .app-head { display: grid; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + Babel (CDN, no build step) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- ZEALWISH product app shell -->
<script type="text/babel" src="src/v5/zealwish-landing.jsx?v=english-app-shell"></script>
</body>
</html>
